name: Scrape & deploy

on:
  # Manual run button in the Actions tab
  workflow_dispatch:
  # Redeploy on every push to main
  push:
    branches: [main]
  # Refresh the headlines on a schedule (hourly, at :17 past the hour, UTC)
  schedule:
    - cron: "17 * * * *"

# Allow GITHUB_TOKEN to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; let scheduled runs supersede each other
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape headlines
        run: python scraper.py

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
