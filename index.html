<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Market News — financial headlines by source</title>
  <meta name="description" content="Financial market headlines aggregated from major outlets, grouped by source. Updated automatically via RSS." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%231e2d4f'/%3E%3Cpolyline points='7,21 13,15 18,18 25,10' fill='none' stroke='%23d4af70' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">
          <svg width="26" height="26" viewBox="0 0 32 32" fill="none">
            <rect width="32" height="32" rx="7" fill="currentColor" />
            <polyline points="7,21 13,15 18,18 25,10" fill="none" stroke="#d4af70"
              stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </span>
        <div>
          <h1>Market News</h1>
          <p class="tagline">Financial headlines, grouped by source</p>
        </div>
      </div>
      <div class="header-tools">
        <input id="filter" type="search" placeholder="Filter headlines…" autocomplete="off" />
        <button id="theme-toggle" type="button" title="Toggle theme" aria-label="Toggle theme"></button>
      </div>
    </div>
    <div class="header-meta">
      <span id="status">Loading…</span>
    </div>
  </header>

  <section id="highlights" class="highlights" aria-label="Highlights"></section>

  <main id="board" class="board" aria-live="polite"></main>

  <footer class="site-footer">
    <p>
      Headlines link to their original publishers. Data aggregated from public RSS feeds and refreshed automatically.
      Built with <a href="https://claude.com/claude-code" target="_blank" rel="noopener">Claude</a>.
    </p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
